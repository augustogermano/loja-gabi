# Use DecapBridge PKCE auth (required)
backend:
  name: git-gateway
  repo: augustogermano/loja-gabi
  branch: main
  auth_type: pkce
  base_url: https://auth.decapbridge.com
  auth_endpoint: /sites/385d0d23-4a0e-4b34-8589-100b0992cb97/pkce
  auth_token_endpoint: /sites/385d0d23-4a0e-4b34-8589-100b0992cb97/token
  gateway_url: https://gateway.decapbridge.com

# See who did what (optional)
commit_messages:
  create: Create {{collection}} "{{slug}}" - {{author-name}} <{{author-login}}> via DecapBridge
  update: Update {{collection}} "{{slug}}" - {{author-name}} <{{author-login}}> via DecapBridge
  delete: Delete {{collection}} "{{slug}}" - {{author-name}} <{{author-login}}> via DecapBridge
  uploadMedia: Upload "{{path}}" - {{author-name}} <{{author-login}}> via DecapBridge
  deleteMedia: Delete "{{path}}" - {{author-name}} <{{author-login}}> via DecapBridge
  openAuthoring: Message {{message}} - {{author-name}} <{{author-login}}> via DecapBridge

# Enable PKCE fields (optional, recommended)
auth:
  email_claim: email
  first_name_claim: first_name
  last_name_claim: last_name
  avatar_url_claim: avatar_url

# Better Decap + Bridge logo (optional)
logo_url: https://decapbridge.com/decapcms-with-bridge.svg

# Add site links in Decap CMS (optional)
site_url: https://startling-mermaid-3bfcb2.netlify.app

media_folder: "images"
public_folder: "images"

collections:
  - name: "site_settings"
    label: "Configurações do Site"
    files:
      - file: "content/settings.json"
        label: "Contato e Redes Sociais"
        name: "settings"
        fields:
          - label: "Número do WhatsApp"
            name: "whatsapp"
            widget: "string"
            hint: "Formato: 5532999999999 (código do país + DDD + número, sem espaços ou símbolos)"
          - label: "Link do Instagram"
            name: "instagram"
            widget: "string"
            hint: "Ex: https://instagram.com/lojagabi"

  - name: "products_data"
    label: "Produtos"
    files:
      - file: "content/products.json"
        label: "Vitrine de Produtos"
        name: "products"
        fields:
          - label: "Produtos"
            name: "products"
            widget: "list"
            summary: "{{title}} — {{price}}"
            fields:
              - { label: "Nome da peça", name: "title", widget: "string" }
              - { label: "Preço", name: "price", widget: "string", hint: "Ex: R$ 129,90" }
              - label: "Categoria"
                name: "category"
                widget: "select"
                options: ["Vestidos", "Blusas", "Calças", "Acessórios"]
              - { label: "Foto", name: "image", widget: "image" }
              - { label: "Descrição curta", name: "description", widget: "text", required: false }
